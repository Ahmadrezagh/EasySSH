name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt
      - name: Create macOS icon
        run: bash scripts/make_icns.sh
      - name: Build app
        run: pyinstaller --noconfirm easyssh.spec
      - name: Sign app (adhoc)
        run: codesign --force --deep --sign - dist/EasySSH.app
      - name: Package macOS app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent EasySSH.app ../EasySSH-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: EasySSH-macOS
          path: EasySSH-macOS.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt
      - name: Build app
        run: pyinstaller --noconfirm easyssh.spec
      - name: Package Linux app
        run: |
          cd dist
          tar -czf ../EasySSH-Linux.tar.gz EasySSH
      - uses: actions/upload-artifact@v4
        with:
          name: EasySSH-Linux
          path: EasySSH-Linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt pillow
      - name: Create Windows icon
        run: python scripts/make_ico.py
      - name: Build app
        run: pyinstaller --noconfirm easyssh.spec
      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path dist/EasySSH -DestinationPath EasySSH-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: EasySSH-Windows
          path: EasySSH-Windows.zip

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: needs.build-macos.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
